name: Deploy FN to GitHub Pages

# FN(정적 빌드)을 GitHub Pages 로 배포한다.
# BN 주소는 repo 변수 BN_BASE 로 주입(Settings > Secrets and variables > Actions > Variables).
#   예) BN_BASE = https://bn.example.com  또는  https://xxxx.trycloudflare.com
# Pages 활성화: Settings > Pages > Source = GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci || npm install
      - name: Build (BN_BASE 주입)
        env:
          BN_BASE: ${{ vars.BN_BASE }}
        run: node build.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
